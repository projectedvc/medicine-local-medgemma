services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medicine
      POSTGRES_USER: medicine
      POSTGRES_PASSWORD: medicine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+psycopg://medicine:medicine@postgres:5432/medicine
      JWT_SECRET: ${JWT_SECRET:-change-this-long-random-value}
      AI_PROVIDER: ${AI_PROVIDER:-external}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-}
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-}
      AI_SERVICE_CF_ACCESS_CLIENT_ID: ${AI_SERVICE_CF_ACCESS_CLIENT_ID:-}
      AI_SERVICE_CF_ACCESS_CLIENT_SECRET: ${AI_SERVICE_CF_ACCESS_CLIENT_SECRET:-}
      AI_ALLOW_MOCK: ${AI_ALLOW_MOCK:-false}
      AI_CONFIDENCE_THRESHOLD: ${AI_CONFIDENCE_THRESHOLD:-0.70}
      AI_MODEL_VERSION: ${AI_MODEL_VERSION:-google/medgemma-4b-it}
      AI_DATASET_VERSION: ${AI_DATASET_VERSION:-local-unvalidated}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,https://aimedicine.vercel.app}
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  backend_data:
